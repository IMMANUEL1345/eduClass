<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    height: 260px; width: 400px;
    background: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    border: 1px solid #e5e5e3;
    user-select: none;
  }
  h1 { font-size: 28px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.5px; }
  p  { font-size: 13px; color: #888; }
  .bar { width: 180px; height: 3px; background: #f0f0ef; border-radius: 2px; overflow: hidden; }
  .fill {
    height: 100%; width: 0%; background: #2563eb; border-radius: 2px;
    animation: load 2.5s ease-in-out forwards;
  }
  @keyframes load { 0%{width:0%} 60%{width:70%} 100%{width:95%} }
</style>
</head>
<body>
  <h1>EduClass</h1>
  <p>Starting up…</p>
  <div class="bar"><div class="fill"></div></div>
</body>
</html>
