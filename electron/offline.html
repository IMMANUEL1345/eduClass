<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduClass — No Connection</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f9fafb;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; color: #374151;
  }
  .card {
    background: #fff; border: 1px solid #e5e7eb;
    border-radius: 20px; padding: 48px 40px;
    text-align: center; max-width: 400px;
  }
  .icon { font-size: 48px; margin-bottom: 20px; }
  h2 { font-size: 20px; font-weight: 600; color: #111827; margin-bottom: 8px; }
  p  { font-size: 14px; color: #6b7280; line-height: 1.6; margin-bottom: 24px; }
  button {
    background: #2563eb; color: #fff;
    border: none; border-radius: 10px;
    padding: 10px 28px; font-size: 14px;
    font-weight: 600; cursor: pointer;
  }
  button:hover { background: #1d4ed8; }
  .sub { font-size: 12px; color: #9ca3af; margin-top: 16px; }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h2>No internet connection</h2>
    <p>EduClass requires an internet connection to work.<br>Please check your network and try again.</p>
    <button onclick="location.reload()">Try again</button>
    <p class="sub">EduClass · School Management System</p>
  </div>
</body>
</html>
