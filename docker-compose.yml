version: '3.9'

services:

  db:
    image: postgres:16-alpine
    container_name: educlass_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       educlass
      POSTGRES_USER:     educlass_user
      POSTGRES_PASSWORD: educlass_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U educlass_user -d educlass"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: educlass_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:     production
      PORT:         5000
      DATABASE_URL: postgres://educlass_user:educlass_pass@db:5432/educlass
      JWT_SECRET:   change_this_in_production_min_64_chars
      JWT_REFRESH_SECRET: change_this_too_in_production_min_64_chars
      JWT_EXPIRES_IN:         15m
      JWT_REFRESH_EXPIRES_IN: 7d
      APP_URL: http://localhost:3000
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000/api
    container_name: educlass_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  pgdata:
